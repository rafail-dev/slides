name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache builds
        uses: actions/cache@v4
        with:
          path: _site
          key: slides-site-${{ github.sha }}
          restore-keys: slides-site-

      - name: Build slides
        run: |
          changed=$(bash .github/workflows/detect-changes.sh)
          bash .github/workflows/build-slides.sh "$changed" "${{ github.event.repository.name }}"
          echo "${{ github.sha }}" > _site/.deployed-sha

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
