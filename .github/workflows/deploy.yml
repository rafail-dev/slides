name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build all presentations
        run: |
          for dir in *_slides/; do
            name="${dir%_slides/}"
            echo "Building $dir → $name"
            cd "$dir"
            bun install
            bunx slidev build --base /${{ github.event.repository.name }}/$name/
            cd ..
            mkdir -p _site/$name
            cp -r "$dir/dist/"* _site/$name/
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
